services:

  staywize-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staywize-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=staywize-db,1433;Database=StayWizeDb;User Id=sa;Password=StayWize_Pass123!;TrustServerCertificate=True;
      - JwtSettings__SecretKey=staywize-secret-key-2026-must-be-long-enough
      - JwtSettings__Issuer=StayWize
      - JwtSettings__Audience=StayWizeUsers
      - JwtSettings__ExpirationHours=24
    depends_on:
      staywize-db:
        condition: service_healthy
    networks:
      - staywize-network

  staywize-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: staywize-db
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StayWize_Pass123!
      - MSSQL_PID=Express
    volumes:
      - staywize-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P StayWize_Pass123! -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - staywize-network

volumes:
  staywize-db-data:

networks:
  staywize-network:
    driver: bridge