services:

  staywize-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staywize-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=staywize-db,1433;Database=StayWizeDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - JwtSettings__SecretKey=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__ExpirationHours=${JWT_EXPIRATION_HOURS}
      - EncryptionSettings__SecretKey=${ENCRYPTION_KEY}
      - SmtpSettings__Host=${SMTP_HOST}
      - SmtpSettings__Port=${SMTP_PORT}
      - SmtpSettings__Username=${SMTP_USERNAME}
      - SmtpSettings__Password=${SMTP_PASSWORD}
      - SmtpSettings__FromName=${SMTP_FROM_NAME}
      - SmtpSettings__FromEmail=${SMTP_FROM_EMAIL}
      - JobSettings__AccessCodeExpirationIntervalMinutes=${JOB_EXPIRATION_INTERVAL_MINUTES}

    depends_on:
      staywize-db:
        condition: service_healthy
    networks:
      - staywize-network

  staywize-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: staywize-db
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    volumes:
      - staywize-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - staywize-network

volumes:
  staywize-db-data:

networks:
  staywize-network:
    driver: bridge